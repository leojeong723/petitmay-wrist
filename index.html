<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쁘띠메이 손목사이즈 계산기</title>
  <style>
    body{font-family:Arial,'Noto Sans KR',sans-serif;background:#fff8ef;color:#3b2a20;margin:0;padding:24px;}
    .wrap{max-width:520px;margin:0 auto;background:#fff;border:1px solid #ffd7a3;border-radius:18px;padding:26px;box-shadow:0 8px 24px rgba(242,139,0,.12)}
    h1{text-align:center;color:#f28b00;margin:10px 0 8px;font-size:30px;line-height:1.25}
    h1 span{display:block}
    .sub{text-align:center;line-height:1.55;color:#6b5a50;margin-bottom:24px}
    .grid{display:grid;grid-template-columns:1fr;gap:14px}
    .box{background:#fffaf3;border:1px solid #ffd7a3;border-radius:14px;padding:16px;margin-bottom:14px}
    .label{font-weight:700;margin-bottom:8px}
    input,select{width:100%;padding:13px;border:1px solid #f5c27b;border-radius:10px;font-size:16px;box-sizing:border-box;background:white}
    .gender{display:flex;gap:8px}
    .gender button{flex:1;border:1px solid #f5c27b;background:#fff;padding:13px;border-radius:10px;font-size:16px;cursor:pointer}
    .gender button.on{background:#f28b00;color:#fff;border-color:#f28b00;font-weight:700}
    .result{text-align:center;border-top:2px solid #f28b00;border-bottom:2px solid #f28b00;padding:24px 0;margin:22px 0}
    .result small{display:block;color:#6b5a50;margin-bottom:8px}
    .result .num{font-size:48px;color:#f28b00;font-weight:800}
    .notice{background:#fff1dc;border-radius:12px;padding:16px;line-height:1.6}
    .muted{font-size:13px;color:#7b6b62;text-align:center;line-height:1.55;margin-top:14px}
    @media(max-width:640px){body{padding:14px}.wrap{padding:22px}h1{font-size:25px}.result .num{font-size:42px}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1><span>쁘띠메이</span><span>손목사이즈 계산기</span></h1>
    <p class="sub">줄자가 없어도 괜찮아요.<br>성별, 키, 몸무게를 입력하면<br>예상 손목 둘레를 안내해 드립니다.</p>

    <div class="grid">
      <div class="box">
        <div class="label">1. 성별</div>
        <div class="gender">
          <button type="button" id="female" class="on" onclick="setGender('female')">여성</button>
          <button type="button" id="male" onclick="setGender('male')">남성</button>
        </div>
      </div>
      <div class="box">
        <div class="label">2. 키(cm)</div>
        <input id="height" type="number" value="160" min="130" max="210" oninput="calc()">
      </div>
      <div class="box">
        <div class="label">3. 몸무게(kg)</div>
        <input id="weight" type="number" value="55" min="30" max="150" oninput="calc()">
      </div>
    </div>

    <div class="result">
      <small>예상 손목 둘레</small>
      <div><span class="num" id="wrist">15.5</span> cm</div>
    </div>

    <div class="notice" id="guide"></div>
    <p class="muted">※ 계산 결과는 평균 신체 비율을 바탕으로 한 참고용이므로, 실제 손목 둘레와 약 ±1cm 차이가 있을 수 있습니다. 산출된 결과로 주문 시 발생하는 사이즈 오차로 인한 반품·교환·환불은 불가합니다. 다만 사이즈 오차로 인한 수선은 무료로 가능하며, 왕복 배송비는 고객님 부담입니다.</p>
  </div>

<script>
let gender='female';
function setGender(g){
  gender=g;
  document.getElementById('female').classList.toggle('on',g==='female');
  document.getElementById('male').classList.toggle('on',g==='male');
  calc();
}
function roundHalf(n){return Math.round(n*2)/2;}
function calc(){
  const h=parseFloat(document.getElementById('height').value)||160;
  const w=parseFloat(document.getElementById('weight').value)||55;
  let wrist;
  if(gender==='female') wrist = 13.1 + (h-155)*0.025 + (w-45)*0.055;
  else wrist = 15.0 + (h-170)*0.025 + (w-65)*0.055;
  wrist = wrist + 1.0;
  wrist=Math.min(Math.max(wrist,13),22);
  wrist=roundHalf(wrist);
  let finished=roundHalf(wrist+1.5);
  document.getElementById('wrist').textContent=wrist.toFixed(1);
  document.getElementById('guide').innerHTML = `주문 시 <b>손목사이즈 ${wrist.toFixed(1)}cm</b>를 선택/입력해 주세요.<br>쁘띠메이는 원석 지름과 착용감을 고려해 실제 완성 팔찌를 약 <b>${finished.toFixed(1)}cm 내외</b>로 제작해드립니다.<br><br><b>정확도를 높이는 팁</b><br>종이나 끈으로 손목을 한 바퀴 감은 뒤, 겹치는 지점을 표시하고 자로 재면 더 정확합니다.`;
}
calc();
</script>
</body>
</html>
